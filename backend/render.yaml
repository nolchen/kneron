# Render Blueprint — deploys the backend as a free web service.
# In Render: New ► Blueprint ► point at this repo. It reads this file.
services:
  - type: web
    name: pm-agent-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY       # paste your Groq key in the Render dashboard
        sync: false
      - key: EMBED_PROVIDER      # ollama = skip notes-search (truly free). Set "openai" + OPENAI_API_KEY to enable it.
        value: ollama
      - key: ALLOWED_ORIGINS     # your Vercel URL, e.g. https://your-app.vercel.app
        sync: false
